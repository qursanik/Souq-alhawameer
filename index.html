    async function handleUsernameChange(form) {
        const oldUsername = editUsernameModal.username;
        const newUsername = form.newUsername.value.trim();
        
        console.log('🔍 تعديل اسم مستخدم:');
        console.log('   القديم:', oldUsername);
        console.log('   الجديد:', newUsername);
        
        if (!newUsername) {
            showAlert('اسم المستخدم فارغ ❌', 'error');
            return;
        }
        
        if (newUsername === oldUsername) {
            showAlert('اسم المستخدم لم يتغير', 'error');
            return;
        }
        
        // التحقق من عدم تكرار اسم المستخدم
        const existingUser = appData.users.find(u => u.username === newUsername && u.username !== oldUsername);
        if (existingUser) {
            showAlert('اسم المستخدم موجود مسبقاً ❌', 'error');
            return;
        }
        
        // البحث عن المستخدم في الذاكرة
        const user = appData.users.find(u => u.username === oldUsername);
        const portfolio = appData.portfolios.find(p => p.username === oldUsername);
        
        console.log('   المستخدم في الذاكرة:', user ? '✅ موجود' : '❌ غير موجود');
        console.log('   المحفظة في الذاكرة:', portfolio ? '✅ موجودة' : '❌ غير موجودة');
        
        if (!user) {
            showAlert('خطأ: المستخدم غير موجود في الذاكرة ❌', 'error');
            console.error('❌ المستخدم غير موجود:', oldUsername);
            console.log('المستخدمين المتاحين:', appData.users.map(u => u.username));
            return;
        }
        
        try {
            showAlert('جاري التعديل...', 'info');
            
            // 1. تحديث البيانات في الذاكرة أولاً
            user.username = newUsername;
            if (portfolio) {
                portfolio.username = newUsername;
            }
            
            // 2. تحديث في باقي المواقع
            appData.activityLog.forEach(log => {
                if (log.user === oldUsername) log.user = newUsername;
                if (log.details && log.details.includes(oldUsername)) {
                    log.details = log.details.replace(new RegExp(oldUsername, 'g'), newUsername);
                }
            });
            
            appData.transactions.forEach(transaction => {
                if (transaction.username === oldUsername) transaction.username = newUsername;
            });
            
            appData.messages.forEach(msg => {
                if (msg.sender === oldUsername) msg.sender = newUsername;
                if (msg.from === oldUsername) msg.from = newUsername;
            });
            
            if (appState.currentUser && appState.currentUser.username === oldUsername) {
                appState.currentUser.username = newUsername;
            }
            
            // 3. Save to Firebase - create new docs with new username, then delete old ones
            console.log('💾 جاري حفظ البيانات الجديدة في Firebase...');
            
            // First, save new documents with updated username
            await db.collection('users').doc(newUsername).set(user);
            console.log(`✅ تم حفظ المستخدم ${newUsername} في Firebase`);
            
            if (portfolio) {
                await db.collection('portfolios').doc(newUsername).set(portfolio);
                console.log(`✅ تم حفظ المحفظة ${newUsername} في Firebase`);
            }
            
            // Save all other data (messages, transactions, activity logs)
            await saveData();
            
            // Only after successful save, delete old documents
            console.log('🗑️ جاري حذف الوثائق القديمة من Firebase...');
            await db.collection('users').doc(oldUsername).delete();
            if (portfolio) {
                await db.collection('portfolios').doc(oldUsername).delete();
            }
            console.log(`✅ تم حذف ${oldUsername} من Firebase`);
            
            addActivityLog('تعديل اسم مستخدم', `تم تغيير اسم المستخدم من ${oldUsername} إلى ${newUsername}`);
            closeEditUsernameModal();
            showAlert(`✅ تم تغيير اسم المستخدم بنجاح`, 'success');
            
            // No need to call render() - the real-time listeners will handle it
            
        } catch (error) {
            console.error('❌ خطأ في التعديل:', error);
            showAlert('فشل تعديل اسم المستخدم ❌ - يرجى إعادة تحميل الصفحة', 'error');
        }
    }

    // Delete student function
    async function deleteStudent(username) {
        try {
            // حذف المستخدم من المصفوفات المحلية
            appData.users = appData.users.filter(u => u.username !== username);
            
            // حذف المحفظة
            appData.portfolios = appData.portfolios.filter(p => p.username !== username);
            
            // حذف المعاملات
            appData.transactions = appData.transactions.filter(t => t.username !== username);
            
            // حذف من سجل النشاط
            appData.activityLog = appData.activityLog.filter(log => 
                !log.details || !log.details.includes(username)
            );
            
            // حذف من Firebase مباشرة
            await db.collection('users').doc(username).delete();
            await db.collection('portfolios').doc(username).delete();
            
            // حذف جميع معاملات المستخدم من Firebase
            const txSnapshot = await db.collection('transactions').where('username', '==', username).get();
            const deleteBatch = db.batch();
            txSnapshot.docs.forEach(doc => {
                deleteBatch.delete(doc.ref);
            });
            await deleteBatch.commit();
            
            // إضافة سجل للحذف
            addActivityLog('حذف طالب', `تم حذف الطالب ${username} ومحفظته وجميع معاملاته`);
            
            // حفظ البيانات المحدثة
            await saveData();
            showAlert(`✅ تم حذف الطالب ${username} بنجاح`, 'success');
            render();
        } catch (error) {
            console.error('Error deleting student:', error);
            showAlert('❌ حدث خطأ أثناء حذف الطالب', 'error');
        }
    }

    async function deleteGuest(username) {
        try {
            // حذف الضيف من المصفوفات المحلية
            appData.users = appData.users.filter(u => u.username !== username);
            
            // حذف المحفظة
            appData.portfolios = appData.portfolios.filter(p => p.username !== username);
            
            // حذف المعاملات
            appData.transactions = appData.transactions.filter(t => t.username !== username);
            
            // حذف رسائل الضيف
            // NOTE: Messages are permanently removed for privacy compliance.
            // RECOMMENDATION: For organizations requiring audit trails or compliance with 
            // data retention policies, implement a soft-delete system where messages are 
            // flagged as deleted but retained in the database with a 'deletedAt' timestamp.
            appData.guestMessages = appData.guestMessages.filter(msg => msg.from !== username);
            
            // حذف من Firebase مباشرة
            await db.collection('users').doc(username).delete();
            await db.collection('portfolios').doc(username).delete();
            
            // حذف جميع معاملات الضيف من Firebase
            const txSnapshot = await db.collection('transactions').where('username', '==', username).get();
            const deleteBatch = db.batch();
            txSnapshot.docs.forEach(doc => {
                deleteBatch.delete(doc.ref);
            });
            await deleteBatch.commit();
            
            // إضافة سجل للحذف
            addActivityLog('حذف ضيف', `تم حذف الضيف ${username} ومحفظته وجميع معاملاته`);
            
            // حفظ البيانات المحدثة
            await saveData();
            showAlert(`✅ تم حذف الضيف ${username} بنجاح`, 'success');
            render();
        } catch (error) {
            console.error('Error deleting guest:', error);
            showAlert('❌ حدث خطأ أثناء حذف الضيف', 'error');
        }
    }

async function init() {
console.log('🚀 Starting Cloud App…');

        // ✅ الحصول على مرجع قاعدة البيانات بعد تحميل Firebase
        db = window.db;
        if (!db) {
            throw new Error('Firebase غير متصل. أعد تحميل الصفحة.');
        }

        // 1. تحميل البيانات من Firebase (الأسهم، المستخدمين، المعاملات)
        await loadData();
        
        // 2. التحقق من تسجيل الدخول
        const savedUser = localStorage.getItem('currentUser');
        if (savedUser) {
            const parsedUser = JSON.parse(savedUser);
            // جلب بيانات المستخدم المحدثة من السحابة (الرصيد الحالي)
            const cloudUser = appData.users.find(u => u.username === parsedUser.username);
            
            if (cloudUser && !cloudUser.suspended) {
                appState.currentUser = cloudUser;
                appState.currentScreen = 'dashboard';
                setupAutoLogout(); // ⏱️ بدء مؤقت تسجيل الخروج التلقائي
            } else {
                localStorage.removeItem('currentUser');
            }
        }
        
        // 3. تشغيل نظام التحديث اللحظي (Live Sync)
        setupRealtimeListeners();
        
        // 4. عرض الصفحة
        render();
        
        console.log('☁️ App is now Live & Interactive');
    }

    async function sendMessage(text) {
        if (!text || !text.trim()) return;
        
        const message = {
            id: Date.now(),
            text: text.trim(),
            sender: appState.currentUser.username,
            role: appState.currentUser.role,
            timestamp: new Date().toISOString(),
            readBy: [appState.currentUser.username] // Sender has read their own message
        };
        
        appData.messages.push(message);
        await saveData();
        
        // Update only chat container instead of full render to avoid interruption
        const chatContainer = document.querySelector('.chat-container');
        if (chatContainer && (appState.activeTab === 'chat' || appState.activeAdminTab === 'chat')) {
            const isAdmin = appState.currentUser.role === 'admin';
            const username = getMessageUsername(message);
            const isAdminMsg = isMessageFromAdmin(message);
            const isOwn = username === appState.currentUser.username;
            
            const messageHTML = `
                <div class="chat-message ${isOwn ? 'own' : 'other'}">
                    <div class="chat-sender" style="font-weight: bold; margin-bottom: 0.35rem; display: flex; align-items: center; gap: 0.5rem; justify-content: space-between;">
                        <div style="display: flex; align-items: center; gap: 0.5rem;">
                            ${username} ${isAdminMsg ? '<span style="background: var(--secondary); color: var(--bg-primary); padding: 0.15rem 0.5rem; border-radius: 12px; font-size: 0.7rem;">👨‍💼 مشرف</span>' : ''}
                        </div>
                        ${isAdmin ? `
                            <button onclick="deleteMessageSync(${message.id})" 
                                    style="background: #e74c3c; color: white; border: none; border-radius: 6px; padding: 0.25rem 0.5rem; font-size: 0.7rem; cursor: pointer; font-weight: bold;">
                                حذف
                            </button>
                        ` : ''}
                    </div>
                    <div style="word-wrap: break-word;">${message.text}</div>
                    <div class="chat-time" style="font-size: 0.75rem; opacity: 0.7; margin-top: 0.35rem;">
                        ${new Date(message.timestamp).toLocaleString('ar-SA', {hour: '2-digit', minute: '2-digit'})}
                    </div>
                </div>
            `;
            
            chatContainer.insertAdjacentHTML('beforeend', messageHTML);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        } else {
            // Fallback to full render if not in chat tab
            render();
        }
    }

    async function deleteMessage(id) {
        appData.messages = appData.messages.filter(m => m.id !== id);
        await saveData();
        
        // Update only chat container without full render to avoid interruption
        const chatContainer = document.querySelector('.chat-container');
        if (chatContainer && (appState.activeTab === 'chat' || appState.activeAdminTab === 'chat')) {
            const isAdmin = appState.currentUser.role === 'admin';
            
            chatContainer.innerHTML = appData.messages.length === 0 
                ? '<p style="text-align: center; color: var(--text-secondary); padding: 2rem;">لا توجد رسائل</p>'
                : appData.messages.map(msg => {
                    const username = getMessageUsername(msg);
                    const isAdminMsg = isMessageFromAdmin(msg);
                    const isOwn = username === appState.currentUser.username;
                    return `
                    <div class="chat-message ${isOwn ? 'own' : 'other'}">
                        <div class="chat-sender" style="font-weight: bold; margin-bottom: 0.35rem; display: flex; align-items: center; gap: 0.5rem; justify-content: space-between;">
                            <div style="display: flex; align-items: center; gap: 0.5rem;">
                                ${username} ${isAdminMsg ? '<span style="background: var(--secondary); color: var(--bg-primary); padding: 0.15rem 0.5rem; border-radius: 12px; font-size: 0.7rem;">👨‍💼 مشرف</span>' : ''}
                            </div>
                            ${isAdmin ? `
                                <button onclick="deleteMessageSync(${msg.id})" 
                                        style="background: #e74c3c; color: white; border: none; border-radius: 6px; padding: 0.25rem 0.5rem; font-size: 0.7rem; cursor: pointer; font-weight: bold;">
                                    حذف
                                </button>
                            ` : ''}
                        </div>
                        <div style="word-wrap: break-word;">${msg.text}</div>
                        <div class="chat-time" style="font-size: 0.75rem; opacity: 0.7; margin-top: 0.35rem;">
                            ${new Date(msg.timestamp).toLocaleString('ar-SA', {hour: '2-digit', minute: '2-digit'})}
                        </div>
                    </div>
                `}).join('');
            chatContainer.scrollTop = chatContainer.scrollHeight;
        } else {
            // Fallback to full render if not in chat tab
            render();
        }
    }

    // Initialize app - waits for Firebase to be ready first
    async function startAppWhenReady() {
        console.log('Starting app initialization...');
        try {
            // ⏳ Wait for Firebase to finish loading (max 15 seconds)
            const waitForFirebase = () => new Promise((resolve, reject) => {
                if (window._firebaseReady) return resolve();
                let waited = 0;
                const interval = setInterval(() => {
                    waited += 200;
                    if (window._firebaseReady) {
                        clearInterval(interval);
                        resolve();
                    } else if (waited >= 15000) {
                        clearInterval(interval);
                        reject(new Error('انتهت مهلة تحميل Firebase'));
                    }
                }, 200);
            });

            await waitForFirebase();
            // 1. Load data from Firebase
            db = window.db;
            if (!db) throw new Error('Firebase غير متصل. أعد تحميل الصفحة.');
            await loadData();
            // 2. Restore session if available
            const savedUser = localStorage.getItem('currentUser');
            if (savedUser) {
                const parsedUser = JSON.parse(savedUser);
                const cloudUser = appData.users.find(u => u.username === parsedUser.username);
                if (cloudUser && !cloudUser.suspended) {
                    appState.currentUser = cloudUser;
                    appState.currentScreen = 'dashboard';
                } else {
                    localStorage.removeItem('currentUser');
                }
            }
            // 3. Set up real-time listeners
            setupRealtimeListeners();
            // 4. Render the UI
            render();
            console.log('App initialized successfully');
        } catch (error) {
            console.error('Failed to initialize app:', error);
            document.getElementById('app').innerHTML = `
                <div style="padding: 2rem; text-align: center; color: #e74c3c;">
                    <h2>فشل تحميل التطبيق</h2>
                    <p>${error.message}</p>
                    <button onclick="location.reload();" 
                            style="padding: 1rem 2rem; background: #2ecc71; color: white; border: none; border-radius: 8px; cursor: pointer; margin-top: 1rem;">
                        🔄 إعادة المحاولة
                    </button>
                </div>
            `;
        }
    }
    // Expose globally so window._onFirebaseReady can access it from any scope
    window.startAppWhenReady = startAppWhenReady;

    // Update _onFirebaseReady to trigger app start
    const _prevOnFirebaseReady = window._onFirebaseReady;
    window._onFirebaseReady = function() {
        if (_prevOnFirebaseReady) _prevOnFirebaseReady();
        if (!window._appStarted) {
            window._appStarted = true;
            window.startAppWhenReady();
        }
    };

    // If Firebase already loaded before this script ran, start immediately
    if (window._firebaseReady && !window._appStarted) {
        window._appStarted = true;
        window.startAppWhenReady();
    }
 

</script>
