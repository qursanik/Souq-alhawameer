<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سوق الهوامير - النسخة المتطورة</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
    :root {
        --primary: #1a4540;
        --primary-light: #236b61;
        --secondary: #d4af37;
        --success: #2ecc71;
        --danger: #e74c3c;
        --warning: #f39c12;
    }
button, .btn {
        touch-action: manipulation; /* يحسن سرعة الاستجابة في الجوال */
        min-height: 44px; /* الحجم القياسي المريح للاصبع */
    }
    input { font-size: 16px !important; } /* يمنع عمل Zoom تلقائي في الآيفون عند الكتابة */
    /* Dark Theme */
    [data-theme="dark"] {
        --bg-primary: #0d2624;
        --bg-secondary: #1a4540;
        --bg-card: #1f524d;
        --text-primary: #e8f1ed;
        --text-secondary: #a8c5b8;
        --border: #2d5650;
    }

    /* Light Theme */
    [data-theme="light"] {
        --bg-primary: #f5f7f6;
        --bg-secondary: #ffffff;
        --bg-card: #ffffff;
        --text-primary: #0a0f0d;
        --text-secondary: #5a6b62;
        --border: #d4dcd8;
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Tajawal', sans-serif;
        background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
        color: var(--text-primary);
        min-height: 100vh;
        transition: all 0.3s ease;
    }

    .container {
        max-width: 1400px;
        margin: 0 auto;
        padding: 1rem;
    }

    /* Animations */
    @keyframes slideUp {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideInRight {
        from { opacity: 0; transform: translateX(-20px); }
        to { opacity: 1; transform: translateX(0); }
    }

    @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
    }

    
    @keyframes scaleIn {
        from { transform: scale(0.9); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
    }

    @keyframes slideInBottom {
        from { transform: translateY(30px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
    }

    @keyframes shimmer {
        0% { background-position: -1000px 0; }
        100% { background-position: 1000px 0; }
    }

    @keyframes bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
    }

    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    .animate-slide-up {
        animation: slideUp 0.6s ease-out;
    }

    .animate-fade-in {
        animation: fadeIn 0.3s ease-out;
    }

    /* Card Styles */
    .card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 2rem;
        box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        transition: all 0.3s ease;
    }

    .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 15px 50px rgba(0,0,0,0.3);
    }

    /* Form Styles */
    .form-group {
        margin-bottom: 1.5rem;
    }

    .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        color: var(--text-secondary);
        font-size: 0.9rem;
        font-weight: 500;
    }

    .form-group input, .form-group select, .form-group textarea {
        width: 100%;
        padding: 1rem;
        background: var(--bg-secondary);
        border: 1px solid var(--border);
        border-radius: 12px;
        color: var(--text-primary);
        font-family: 'Tajawal', sans-serif;
        font-size: 1rem;
        transition: all 0.3s ease;
    }

    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
        outline: none;
        border-color: var(--primary-light);
        box-shadow: 0 0 0 3px rgba(15, 107, 82, 0.1);
    }

    /* Button Styles */
    .btn {
        padding: 1rem 2rem;
        border: none;
        border-radius: 12px;
        font-family: 'Cairo', sans-serif;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.3s ease;
        display: inline-block;
        text-align: center;
    }

    .btn-primary {
        background: linear-gradient(135deg, var(--primary), var(--primary-light));
        color: white;
    }

    .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 30px rgba(15, 107, 82, 0.3);
    }

    .btn-secondary {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text-secondary);
    }

    .btn-secondary:hover {
        background: var(--bg-secondary);
        color: var(--text-primary);
    }

    .btn-success {
        background: linear-gradient(135deg, var(--success), #27ae60);
        color: white;
    }

    .btn-danger {
        background: linear-gradient(135deg, var(--danger), #c0392b);
        color: white;
    }

    .btn-small {
        padding: 0.5rem 1rem;
        font-size: 0.85rem;
    }

    /* Header */
    .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 1.5rem 0;
        margin-bottom: 2rem;
        border-bottom: 1px solid var(--border);
        flex-wrap: wrap;
        gap: 1rem;
    }

    .header-title h1 {
        font-family: 'Cairo', sans-serif;
        font-size: 1.8rem;
        font-weight: 900;
        color: var(--secondary);
    }

    .header-actions {
        display: flex;
        gap: 1rem;
        align-items: center;
        flex-wrap: wrap;
    }

    .theme-toggle {
        background: var(--bg-card);
        border: 1px solid var(--border);
        color: var(--text-primary);
        width: 50px;
        height: 50px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .theme-toggle:hover {
        transform: rotate(180deg);
        background: var(--primary);
    }

    .notification-btn {
        position: relative;
        background: var(--bg-card);
        border: 1px solid var(--border);
        color: var(--text-primary);
        width: 50px;
        height: 50px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .notification-badge {
        position: absolute;
        top: 0px;
        right: 0px;
        background: var(--danger);
        color: white;
        border-radius: 10px;
        padding: 2px 6px;
        font-size: 0.7rem;
        font-weight: bold;
        animation: pulse 2s infinite;
    }

    .notification-dropdown {
        position: absolute;
        top: 150px;
        right: 50px;
        width: 350px;
        max-height: 500px;
        overflow-y: auto;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 1rem;
        box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        z-index: 1000;
        display: none;
    }

    .notification-dropdown.active {
        display: block;
        animation: slideUp 0.3s ease-out;
    }

    .notification-item {
        padding: 1rem;
        background: var(--bg-secondary);
        border-radius: 12px;
        margin-bottom: 0.5rem;
        animation: slideInRight 0.3s ease-out;
    }

    /* Stats Grid */
    .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 1.5rem;
        margin-bottom: 2rem;
    }

    .stat-card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 1.5rem;
        position: relative;
        overflow: hidden;
        transition: all 0.3s ease;
    }

    .stat-card::before {
        content: '';
        position: absolute;
        top: 0;
        right: 0;
        width: 100px;
        height: 100px;
        background: radial-gradient(circle, var(--primary-light) 0%, transparent 70%);
        opacity: 0.1;
    }

    .stat-label {
        color: var(--text-secondary);
        font-size: 0.85rem;
        margin-bottom: 0.5rem;
    }

    .stat-value {
        font-size: 2rem;
        font-weight: 800;
        font-family: 'Cairo', sans-serif;
        color: var(--text-primary);
    }

    .stat-change {
        font-size: 0.85rem;
        margin-top: 0.5rem;
    }

    .stat-change.positive { color: var(--success); }
    .stat-change.negative { color: var(--danger); }

    /* Tabs */
    .tabs {
        display: flex;
        gap: 1rem;
        margin-bottom: 2rem;
        border-bottom: 1px solid var(--border);
        overflow-x: auto;
    }

    .tab {
        padding: 1rem 1.5rem;
        background: none;
        border: none;
        color: var(--text-secondary);
        font-family: 'Tajawal', sans-serif;
        font-size: 1rem;
        cursor: pointer;
        border-bottom: 2px solid transparent;
        transition: all 0.3s ease;
        white-space: nowrap;
        position: relative; /* Required for notification badge positioning */
    }

    .tab.active {
        color: var(--secondary);
        border-bottom-color: var(--secondary);
        font-weight: bold;
    }

    .tab:hover {
        color: var(--primary-light);
    }

    .tab-content {
        display: none;
    }

    .tab-content.active {
        display: block;
        animation: fadeIn 0.3s ease-out;
    }

    /* Stock Card */
    .stock-card {
        background: var(--bg-secondary);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 1.5rem;
        margin-bottom: 1rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .stock-card:hover {
        transform: translateX(-5px);
        border-color: var(--primary-light);
        box-shadow: 0 5px 20px rgba(0,0,0,0.2);
    }

    .stock-info h3 {
        font-size: 1.2rem;
        font-weight: 700;
        margin-bottom: 0.3rem;
    }

    .stock-info p {
        color: var(--text-secondary);
        font-size: 0.9rem;
    }

    .stock-price {
        text-align: left;
    }

    .stock-price .price {
        font-size: 1.5rem;
        font-weight: 800;
        font-family: 'Cairo', sans-serif;
    }

    .stock-price .change {
        font-size: 0.9rem;
        margin-top: 0.3rem;
    }

    .ownership-badge {
        position: absolute;
        top: 0.5rem;
        left: 0.5rem;
        background: var(--secondary);
        color: var(--bg-primary);
        padding: 0.25rem 0.75rem;
        border-radius: 12px;
        font-size: 0.75rem;
        font-weight: bold;
        box-shadow: 0 2px 8px rgba(212, 175, 55, 0.3);
    }

    /* Modal */
    .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.8);
        backdrop-filter: blur(5px);
        z-index: 1000;
        align-items: center;
        justify-content: center;
        padding: 1rem;
    }

    .modal.active {
        display: flex;
        animation: fadeIn 0.3s ease-out;
    }

    .modal-content {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 2.5rem;
        max-width: 600px;
        width: 100%;
        max-height: 90vh;
        overflow-y: auto;
        animation: slideUp 0.3s ease-out;
    }

    .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 2rem;
    }

    .modal-close {
        background: none;
        border: none;
        color: var(--danger);
        font-size: 2rem;
        cursor: pointer;
        padding: 0;
        transition: transform 0.3s ease;
    }

    .modal-close:hover {
        transform: rotate(90deg);
    }

    /* Transaction Item */
    .transaction-item {
        background: var(--bg-secondary);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 1.5rem;
        margin-bottom: 1rem;
    }

    .transaction-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 0.5rem;
    }

    .transaction-badge {
        display: inline-block;
        padding: 0.3rem 0.8rem;
        border-radius: 20px;
        font-size: 0.85rem;
        font-weight: bold;
        margin-left: 0.5rem;
    }

    .transaction-badge.buy {
        background: var(--success);
        color: white;
    }

    .transaction-badge.sell {
        background: var(--danger);
        color: white;
    }

    /* Achievement Badge */
    .achievement-card {
        text-align: center;
        padding: 2rem;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 16px;
        transition: all 0.3s ease;
    }

    .achievement-card.unlocked {
        border-color: var(--secondary);
        box-shadow: 0 5px 20px rgba(212, 175, 55, 0.3);
    }

    .achievement-card.locked {
        opacity: 0.5;
        filter: grayscale(100%);
    }

    .achievement-icon {
        font-size: 4rem;
        margin-bottom: 1rem;
    }

    .achievement-name {
        font-size: 1.2rem;
        font-weight: bold;
        margin-bottom: 0.5rem;
    }

    .achievement-desc {
        font-size: 0.9rem;
        color: var(--text-secondary);
    }

    /* Leaderboard */
    .leaderboard-item {
        display: flex;
        align-items: center;
        padding: 1.5rem;
        background: var(--bg-secondary);
        border-radius: 12px;
        margin-bottom: 1rem;
        transition: all 0.3s ease;
    }

    .leaderboard-item:hover {
        transform: translateX(-5px);
    }

    .leaderboard-item.rank-1 { border-right: 4px solid #ffd700; }
    .leaderboard-item.rank-2 { border-right: 4px solid #c0c0c0; }
    .leaderboard-item.rank-3 { border-right: 4px solid #cd7f32; }

    .rank {
        font-size: 2rem;
        font-weight: 900;
        font-family: 'Cairo', sans-serif;
        min-width: 60px;
        text-align: center;
    }

    .rank.gold { color: #ffd700; }
    .rank.silver { color: #c0c0c0; }
    .rank.bronze { color: #cd7f32; }

    .color-dot {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        margin: 0 1rem;
    }

    .leaderboard-info {
        flex: 1;
    }

    .leaderboard-name {
        font-size: 1.2rem;
        font-weight: 700;
        margin-bottom: 0.3rem;
    }

    .leaderboard-stats {
        color: var(--text-secondary);
        font-size: 0.85rem;
    }

    .leaderboard-value {
        font-size: 1.5rem;
        font-weight: 800;
        font-family: 'Cairo', sans-serif;
        color: var(--secondary);
    }

    /* Chat */
    .chat-container {
        max-height: 500px;
        overflow-y: auto;
        padding: 1rem;
        background: var(--bg-secondary);
        border-radius: 12px;
        margin-bottom: 1rem;
        scroll-behavior: smooth;
    }

    .chat-message {
        margin-bottom: 1rem;
        padding: 1rem;
        border-radius: 12px;
        max-width: 70%;
        animation: slideInRight 0.3s ease-out;
    }

    .chat-message.own {
        background: var(--primary);
        color: white;
        margin-right: 0;
        margin-left: auto;
    }

    .chat-message.other {
        background: var(--bg-card);
        margin-left: 0;
        margin-right: auto;
    }

    .chat-sender {
        font-weight: bold;
        margin-bottom: 0.3rem;
        font-size: 0.9rem;
    }

    .chat-time {
        font-size: 0.75rem;
        opacity: 0.7;
        margin-top: 0.3rem;
    }

    .chat-input-group {
        display: flex;
        gap: 0.5rem;
    }

    .chat-input-group input {
        flex: 1;
    }

    /* Alert */
    .alert {
        padding: 1rem;
        border-radius: 12px;
        margin-bottom: 1rem;
        font-size: 0.9rem;
        animation: slideUp 0.3s ease-out;
    }

    .alert-success {
        background: rgba(46, 204, 113, 0.1);
        border: 1px solid rgba(46, 204, 113, 0.3);
        color: var(--success);
    }

    .alert-error {
        background: rgba(231, 76, 60, 0.1);
        border: 1px solid rgba(231, 76, 60, 0.3);
        color: var(--danger);
    }

    .alert-warning {
        background: rgba(243, 156, 18, 0.1);
        border: 1px solid rgba(243, 156, 18, 0.3);
        color: var(--warning);
    }

    .alert-info {
        background: rgba(15, 107, 82, 0.1);
        border: 1px solid rgba(15, 107, 82, 0.3);
        color: var(--primary-light);
    }

    /* Table */
    table {
        width: 100%;
        border-collapse: collapse;
    }

    th, td {
        text-align: right;
        padding: 1rem;
        border-bottom: 1px solid var(--border);
    }

    th {
        color: var(--text-secondary);
        font-weight: 600;
        font-size: 0.9rem;
        background: var(--bg-secondary);
    }

    tr:hover {
        background: var(--bg-secondary);
    }

    /* Responsive */
    @media (max-width: 768px) {
        .header {
            flex-direction: column;
            align-items: flex-start;
        }

        .stats-grid {
            grid-template-columns: 1fr;
        }

        .modal-content {
            padding: 1.5rem;
        }

        .chat-message {
            max-width: 85%;
        }

        .notification-dropdown {
            width: 300px;
            right: -50px;
        }
    }

    .hidden {
        display: none !important;
    }

    /* Loading */
    .loading {
        text-align: center;
        padding: 2rem;
        color: var(--text-secondary);
    }

    .loading::after {
        content: '...';
        animation: dots 1.5s steps(4, end) infinite;
    }

    @keyframes dots {
        0%, 20% { content: '.'; }
        40% { content: '..'; }
        60%, 100% { content: '...'; }
    }

    /* Tooltips */
    .tooltip {
        position: relative;
        display: inline-block;
    }

    .tooltip::after {
        content: attr(data-tooltip);
        position: absolute;
        bottom: 125%;
        left: 50%;
        transform: translateX(-50%) scale(0);
        background: rgba(0, 0, 0, 0.9);
        color: white;
        padding: 0.5rem 1rem;
        border-radius: 8px;
        font-size: 0.85rem;
        white-space: nowrap;
        opacity: 0;
        pointer-events: none;
        transition: all 0.3s ease;
        z-index: 10000;
    }

    .tooltip::before {
        content: '';
        position: absolute;
        bottom: 115%;
        left: 50%;
        transform: translateX(-50%) scale(0);
        border: 6px solid transparent;
        border-top-color: rgba(0, 0, 0, 0.9);
        opacity: 0;
        transition: all 0.3s ease;
    }

    .tooltip:hover::after,
    .tooltip:hover::before {
        opacity: 1;
        transform: translateX(-50%) scale(1);
    }

    
    /* Skeleton Loading */
    @keyframes skeleton-loading {
        0% { background-position: -200px 0; }
        100% { background-position: calc(200px + 100%) 0; }
    }

    .skeleton {
        background: linear-gradient(
            90deg,
            var(--bg-secondary) 0%,
            var(--border) 50%,
            var(--bg-secondary) 100%
        );
        background-size: 200px 100%;
        animation: skeleton-loading 1.5s ease-in-out infinite;
        border-radius: 8px;
    }

    .skeleton-text {
        height: 1rem;
        margin-bottom: 0.5rem;
    }

    .skeleton-title {
        height: 1.5rem;
        width: 60%;
        margin-bottom: 1rem;
    }

    
    /* Enhanced card hover effects */
    .card {
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .card:hover {
        transform: translateY(-8px) scale(1.02);
        box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    /* Stock card animations */
    .stock-card {
        transition: all 0.3s ease;
        cursor: pointer;
        position: relative;
        overflow: hidden;
    }

    .stock-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(212,175,55,0.1), transparent);
        transition: left 0.5s;
    }

    .stock-card:hover::before {
        left: 100%;
    }

    .stock-card:hover {
        transform: translateX(8px);
        box-shadow: -4px 0 20px rgba(212,175,55,0.3);
        border-right-color: var(--secondary);
        border-right-width: 4px;
    }

    /* Button pulse animation */
    @keyframes pulse-glow {
        0%, 100% {
            box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.7);
        }
        50% {
            box-shadow: 0 0 20px 10px rgba(212, 175, 55, 0);
        }
    }

    .btn-primary:hover {
        animation: pulse-glow 1.5s infinite;
    }

    /* Smooth transitions for all interactive elements */
    button, .btn, a, input, select {
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    button:hover, .btn:hover {
        transform: translateY(-2px);
    }

    button:active, .btn:active {
        transform: translateY(0) scale(0.98);
    }

    /* Input focus effects */
    input:focus, select:focus {
        outline: none;
        border-color: var(--secondary);
        box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
        transform: scale(1.02);
    }

    /* Glowing effect for important elements */
    .glow {
        animation: glow-pulse 2s ease-in-out infinite;
    }

    @keyframes glow-pulse {
        0%, 100% {
            filter: drop-shadow(0 0 5px var(--secondary));
        }
        50% {
            filter: drop-shadow(0 0 20px var(--secondary));
        }
    }

    </style>

async function handlePasswordReset(form) {
const code = (form.code?.value ?? '').trim();
const newPassword = form.newPassword.value;
const confirmPassword = form.confirmPassword.value;

// التحقق من وجود confirmationResult
if (!window.resetConfirmationResult || !appState.forgotPasswordPhone) {
    showAlert('حدث خطأ. يرجى المحاولة مرة أخرى ❌', 'error');
    appState.currentScreen = 'forgot';
    render();
    return;
}

if (newPassword !== confirmPassword) {
    showAlert('كلمة المرور غير متطابقة ❌', 'error');
    return;
}

try {
    showAlert('جاري التحقق من الرمز...', 'info');

    // التحقق من الرمز عبر Firebase
    const result = await window.resetConfirmationResult.confirm(code);
    
    console.log('✅ Reset code verified:', result.phoneNumber);

    // Additional security check: Verify the phone number matches (normalize by stripping spaces)
    const normalizePhone = p => (p || '').replace(/\s+/g, '');
    if (result.phoneNumber && normalizePhone(result.phoneNumber) !== normalizePhone(appState.forgotPasswordPhone)) {
        console.error('❌ Phone number mismatch:', result.phoneNumber, 'vs', appState.forgotPasswordPhone);
        showAlert('خطأ في التحقق من رقم الجوال ❌', 'error');
        appState.currentScreen = 'forgot';
        render();
        return;
    }

    // تحديث كلمة المرور
    const user = appData.users.find(u => u.phone === appState.forgotPasswordPhone);
    
    if (!user) {
        showAlert('خطأ: المستخدم غير موجود ❌', 'error');
        return;
    }
    
    // تشفير كلمة المرور الجديدة
    user.passwordHash = await hashPassword(newPassword);
    delete user.password; // إزالة أي password غير مشفر
    
    // Mark phone as verified since they just verified it via SMS
    // Note: This intentionally marks ALL users (including legacy users) as verified
    // when they successfully complete SMS verification during password reset
    if (!user.phoneVerified) {
        user.phoneVerified = true;
        user.phoneVerifiedAt = new Date().toISOString();
    }
    
    // حفظ البيانات
    saveData();
    
    // تنظيف البيانات المؤقتة
    window.resetConfirmationResult = null;
    appState.forgotPasswordPhone = null;
    appState.resetPasswordCode = null;
    appState.recoveredUsername = null;
    
    // تسجيل خروج من Firebase Auth
    await firebase.auth().signOut();
    
    showAlert('تم تغيير كلمة المرور بنجاح! ✅', 'success');
    
    appState.currentScreen = 'login';
    render();

} catch (error) {
    console.error('❌ Reset verification error:', error);
    
    let errorMsg = 'رمز التحقق غير صحيح';
    
    if (error.code === 'auth/invalid-verification-code') {
        errorMsg = 'رمز التحقق غير صحيح';
    } else if (error.code === 'auth/code-expired') {
        errorMsg = 'انتهت صلاحية الرمز. حاول مرة أخرى';
    }
    
    showAlert(errorMsg + ' ❌', 'error');
}

}

function handleAdminProfileUpdate(form) {
const newUsername = form.username.value.trim();

        showAlert('اسم المستخدم هذا مستخدم بالفعل! ❌', 'error');
        return;
    }
}

const oldUsername = currentUser.username;
const userIndex = appData.users.findIndex(u => u.username === oldUsername);
if (userIndex !== -1) {
    appData.users[userIndex].username = newUsername;
    currentUser.username = newUsername; // Update session
    
    appData.portfolios.forEach(p => { if(p.username === oldUsername) p.username = newUsername; });
    appData.transactions.forEach(t => { if(t.username === oldUsername) t.username = newUsername; });
    
    if (newPassword.trim() !== "") {
        appData.users[userIndex].password = newPassword;
        currentUser.password = newPassword;

    saveData();
    showAlert('تم تحديث البيانات بنجاح ✅', 'success');

    let _pollingInterval = null;
    let _lastPollData = {}; // لتتبع التغييرات
    let _isSaving = false; // 🔒 منع polling من استبدال البيانات أثناء الحفظ

    async function pollFirestore() {
        if (!db) return;
        if (_isSaving) { console.log("⏸ Poll skipped - save in progress"); return; } // 🔒 لا تُحدِّث البيانات أثناء الحفظ
        try {
            // 1. تحميل البيانات الرئيسية
            const appDoc = await db.collection('appData').doc('main').get();
            if (appDoc.exists) {
                const data = appDoc.data();
                const oldMessagesLength = appData.messages.length;
                const oldLastMessageId = appData.messages.length > 0 ? appData.messages[appData.messages.length - 1].id : null;
                const oldStockPrices = appData.stocks.map(s => s.price).join(',');

                appData.stocks = data.stocks || appData.stocks;
                appData.messages = data.messages || appData.messages;
                appData.guestMessages = data.guestMessages || appData.guestMessages;
                appData.settings = data.settings || appData.settings;
                appData.activityLog = data.activityLog || appData.activityLog;
                appData.notifications = data.notifications || appData.notifications;

                const newStockPrices = appData.stocks.map(s => s.price).join(',');
                const stocksChanged = newStockPrices !== oldStockPrices;
                const newLastId = appData.messages.length > 0 ? appData.messages[appData.messages.length - 1].id : null;
                const messagesChanged = appData.messages.length !== oldMessagesLength || newLastId !== oldLastMessageId;

                if (stocksChanged || messagesChanged) {
                    // تحديث الشات مباشرة إذا كان مفتوحاً
                    const inChatTab = (appState.activeTab === 'chat' || appState.activeAdminTab === 'chat');
                    if (inChatTab && messagesChanged) {
                        const chatContainer = document.querySelector('.chat-container');
                        if (chatContainer) {
                            const isAtBottom = chatContainer.scrollHeight - chatContainer.scrollTop <= chatContainer.clientHeight + 50;
                            const isAdmin = appState.currentUser && appState.currentUser.role === 'admin';
                            chatContainer.innerHTML = appData.messages.length === 0
                                ? '<p style="text-align:center;color:var(--text-secondary);padding:2rem;">لا توجد رسائل</p>'
                                : appData.messages.map(msg => {

                                    const isOwn = username === (appState.currentUser && appState.currentUser.username);
                                    return `<div class="chat-message ${isOwn ? 'own' : 'other'}">

                                }).join('');

                        }
                    } else {
                        debouncedRender();
                    }

            const usersSnap = await db.collection('users').get();
            const newUsers = [];
            usersSnap.forEach(doc => {
                const u = doc.data();
                if (!u.notifications) u.notifications = [];
                newUsers.push(u);
            });
            const usersChanged = JSON.stringify(newUsers.map(u=>u.username+u.balance+u.suspended)) !==
                                 JSON.stringify(appData.users.map(u=>u.username+u.balance+u.suspended));
            appData.users = newUsers;

            // تحديث المستخدم الحالي إذا تغيرت بياناته

            // 3. تحميل المحافظ
            const portfoliosSnap = await db.collection('portfolios').get();

        }

    function setupRealtimeListeners() {
        if (!db) {
            console.warn('⚠️ Firebase not available - sync disabled');
            return;
        }

        // إيقاف أي polling سابق
        if (_pollingInterval) {
            clearInterval(_pollingInterval);
            _pollingInterval = null;
        }

        console.log('📡 Starting polling sync (iOS-compatible)...');

        // تشغيل أول poll فوراً
        pollFirestore();

        // ثم كل 5 ثواني
        _pollingInterval = setInterval(pollFirestore, 5000);

        // إعادة التشغيل عند عودة الاتصال
        window.addEventListener('online', () => {
            console.log('🌐 Network restored - resuming sync...');
            showConnectionStatus(false);
            pollFirestore();
        });
        window.addEventListener('offline', () => {
            console.warn('📵 Network lost');
            showConnectionStatus(false);
        });

        console.log('✅ Connected to Live Global Market');
    }

    async function saveData() {
        // Clear existing timeout to debounce
        if (saveTimeout) clearTimeout(saveTimeout);
        
        // Wait 500ms before saving
        saveTimeout = setTimeout(async () => {
            _isSaving = true; // 🔒 Lock polling
            console.log('💾 Saving ALL data to Firebase...');
            
            try {
                // Save main app data (INCLUDING settings and messages!)
                await db.collection('appData').doc('main').set({
                    stocks: appData.stocks,
                    activityLog: appData.activityLog,
                    settings: appData.settings,
                    messages: appData.messages,
                    guestMessages: appData.guestMessages,
                    notifications: appData.notifications,
                    weeklyStats: appData.weeklyStats
                });
                
                // Save users in batches (max 499 per batch to stay under Firestore 500-op limit)
                const BATCH_LIMIT = 499;
                for (let i = 0; i < appData.users.length; i += BATCH_LIMIT) {
                    const usersBatch = db.batch();
                    appData.users.slice(i, i + BATCH_LIMIT).forEach(user => {
                        usersBatch.set(db.collection('users').doc(user.username), user);
                    });
                    await usersBatch.commit();
                }
                
                // Save portfolios in batches
                for (let i = 0; i < appData.portfolios.length; i += BATCH_LIMIT) {
                    const portfoliosBatch = db.batch();
                    appData.portfolios.slice(i, i + BATCH_LIMIT).forEach(portfolio => {
                        portfoliosBatch.set(db.collection('portfolios').doc(portfolio.username), portfolio);
                    });
                    await portfoliosBatch.commit();
                }
                
                // Save transactions in batches (this is the most likely to exceed 500)
                for (let i = 0; i < appData.transactions.length; i += BATCH_LIMIT) {
                    const txBatch = db.batch();
                    appData.transactions.slice(i, i + BATCH_LIMIT).forEach(tx => {
                        txBatch.set(db.collection('transactions').doc(tx.id.toString()), tx);
                    });
                    await txBatch.commit();
                }
                
                console.log('✅ ALL data saved to Firebase (Cloud Storage)');
                
            } catch (e) {
                console.error('❌ Failed to save to Firebase:', e);
                showAlert('خطأ في الحفظ السحابي', 'error');
            } finally {
                _isSaving = false; // 🔓 Unlock polling
            }
        }, 500);
    }

                    appData.stocks = backupData.appData.stocks || [];

                        stocks: appData.stocks,

                        settings: appData.settings,
                        messages: appData.messages,
                        notifications: appData.notifications,

    // Verify Firebase data integrity
    async function verifyDataIntegrity() {
        try {
            showAlert('جاري التحقق من سلامة البيانات...', 'info');
            console.log('🔍 Verifying data integrity...');

            const report = {
                local: {
                    users: appData.users.length,
                    portfolios: appData.portfolios.length,
                    transactions: appData.transactions.length,
                    stocks: appData.stocks.length,
                    messages: appData.messages.length
                },
                firebase: {
                    users: 0,
                    portfolios: 0,
                    transactions: 0,
                    stocks: 0,
                    messages: 0
                }
            };

            // Count Firebase documents
            const usersSnapshot = await db.collection('users').get();
            report.firebase.users = usersSnapshot.size;

            const portfoliosSnapshot = await db.collection('portfolios').get();
            report.firebase.portfolios = portfoliosSnapshot.size;

            const transactionsSnapshot = await db.collection('transactions').get();
            report.firebase.transactions = transactionsSnapshot.size;

            const mainSnapshot = await db.collection('appData').doc('main').get();
            if (mainSnapshot.exists) {
                const data = mainSnapshot.data();
                report.firebase.stocks = data.stocks?.length || 0;
                report.firebase.messages = data.messages?.length || 0;
            }

            console.log('📊 Data Integrity Report:', report);

            // Check for discrepancies
            const issues = [];
            if (report.local.users !== report.firebase.users) {
                issues.push(`المستخدمين: محلي ${report.local.users} ≠ Firebase ${report.firebase.users}`);
            }
            if (report.local.portfolios !== report.firebase.portfolios) {
                issues.push(`المحافظ: محلي ${report.local.portfolios} ≠ Firebase ${report.firebase.portfolios}`);
            }
            if (report.local.transactions !== report.firebase.transactions) {
                issues.push(`المعاملات: محلي ${report.local.transactions} ≠ Firebase ${report.firebase.transactions}`);
            }
            if (report.local.stocks !== report.firebase.stocks) {
                issues.push(`الأسهم: محلي ${report.local.stocks} ≠ Firebase ${report.firebase.stocks}`);
            }
            if (report.local.messages !== report.firebase.messages) {
                issues.push(`الرسائل: محلي ${report.local.messages} ≠ Firebase ${report.firebase.messages}`);
            }

            if (issues.length > 0) {
                const message = '⚠️ تم العثور على اختلافات:\n\n' + issues.join('\n') + '\n\nهل تريد مزامنة البيانات المحلية إلى Firebase؟';
                if (window.confirm(message)) {
                    await forceFullSave();
                    showAlert('✅ تمت المزامنة بنجاح', 'success');
                }
            } else {
                showAlert('✅ البيانات متطابقة تماماً بين المحلي وFirebase', 'success');
            }

            addActivityLog('التحقق من سلامة البيانات', `محلي: ${report.local.users} مستخدمين، Firebase: ${report.firebase.users} مستخدمين`);
        } catch (error) {
            console.error('❌ Error verifying data integrity:', error);
            showAlert('فشل التحقق من سلامة البيانات ❌', 'error');
        }
    }

    function generateHistory(price) {
        const history = [];
        let p = price * 0.9;
        for (let i = 0; i < 30; i++) {
            p += (Math.random() - 0.5) * 2;
            history.push(Math.max(p, price * 0.8));

            id: Date.now(),
            text,
            type,
            timestamp: new Date().toISOString(),
            read: false
        };
        
        // If targetUsername is specified, add to that user only

        if (targetUsername) {
            const user = appData.users.find(u => u.username === targetUsername);
            if (user) {
                if (!user.notifications) user.notifications = [];
                user.notifications.unshift(notification);
                user.notifications = user.notifications.slice(0, 10);

                user.notifications.unshift({...notification, id: Date.now() + Math.random()}); // Unique ID per user

            });

        const userTxs = appData.transactions.filter(t => t.username === username);

        function formatPhoneNumber(phone) {
        // Ensure consistent phone number formatting for Saudi Arabia
        if (!phone) return null;
        
        let formatted = phone.trim();
        
        // Already has + prefix, return as-is
        if (formatted.startsWith('+')) {
            return formatted;
        }
        
        // Handle different formats
        if (formatted.startsWith('00')) {
            // 00966... format
            formatted = '+' + formatted.substring(2);
        } else if (formatted.startsWith('0')) {
            // 05... format (local Saudi format)
            formatted = '+966' + formatted.substring(1);
        } else if (formatted.startsWith('966')) {
            // 966... format
            formatted = '+' + formatted;
        } else {
            // Assume it's a local number without prefix
            formatted = '+966' + formatted;
        }
        
        return formatted;
    }

        } else if (error.code === 'auth/captcha-check-failed') {

        } else if (error.code === 'auth/missing-phone-number') {

        } else if (error.code === 'auth/operation-not-allowed') {
            errorMessage = 'خدمة التحقق عبر الرسائل النصية غير مفعلة. يرجى التواصل مع الدعم الفني';
        } else if (error.code === 'auth/requires-recent-login') {

        } else if (error.message && error.message.includes('503')) {
            errorMessage = 'خدمة Firebase غير متاحة حالياً (503). يرجى المحاولة بعد قليل';
        } else if (error.code === 'auth/error-code:-39' || (error.message && error.message.includes('auth/error-code:-39'))) {
            errorMessage = 'خدمة التحقق عبر الرسائل النصية غير متاحة حالياً. يرجى المحاولة بعد قليل';
        } else if (error.message && error.message.includes('network')) {

        } else {

            errorMessage = `فشل إرسال رمز التحقق. ${error.code ? `(${error.code})` : ''}\n\nتأكد من:\n• تفعيل خدمة Phone Authentication في Firebase\n• صحة رقم الجوال\n• الاتصال بالإنترنت`;
        }
        
        return errorMessage;
    }

    // Helper function to check if an error is retryable
    function isRetryableError(error) {
        if (!error) return false;
        const code = error.code || '';
        if (code === 'TOO_MANY_ATTEMPTS_TRY_LATER') return false; // Don't retry this
        // Check if error is a transient service error that can be retried
        if (error.message && error.message.includes('503')) return true;
        if (code.includes('-39')) return true; // Firebase error-code:-39
        if (code === 'auth/error-code:-39') return true; // Exact match
        if (error.message && error.message.includes('error-code:-39')) return true; // Backup check in message
        if (code === 'auth/network-request-failed') return true;
        if (code === 'auth/captcha-check-failed') return true; // Retry on captcha failures
        if (code === 'auth/timeout') return true; // Retry on timeout
        if (error.message && error.message.toLowerCase().includes('timeout')) return true;
        return false;
    }

    async function handleLogin(e) {
        e.preventDefault();
        const username = e.target.username.value;
        const password = e.target.password.value;

        const user = appData.users.find(u => u.username === username);
        
        if (!user) {
            showAlert('اسم المستخدم أو كلمة المرور غير صحيحة ❌', 'error');
            return;
        }

        // التحقق من كلمة المرور (دعم كلاً من password و passwordHash)
        const passwordHash = await hashPassword(password);
        const isPasswordCorrect = (user.password && user.password === password) || 
                                 (user.passwordHash && user.passwordHash === passwordHash);
        
        if (!isPasswordCorrect) {
            showAlert('اسم المستخدم أو كلمة المرور غير صحيحة ❌', 'error');
            return;
        }

        // Check phone verification status (only for accounts with phoneVerified flag explicitly set to false)
        // Note: Existing users without the flag can still log in (backward compatibility)
        // Users who fail verification after registration starts will need to re-register
        if (user.hasOwnProperty('phoneVerified') && user.phoneVerified === false) {
            showAlert('لم يتم التحقق من رقم الجوال. يرجى إكمال عملية التحقق ❌', 'error');
            return;
        }

        if (user.suspended) {
            showAlert('تم تعليق هذا الحساب. تواصل مع الإدارة ⛔', 'error');
            return;
        }

        appState.currentUser = user;
        appState.currentScreen = 'dashboard';
        console.log('✅ Login successful:', username, 'Role:', user.role);
        addActivityLog('تسجيل دخول', `${username} سجل دخول للنظام`);
        setupAutoLogout(); // ⏱️ بدء مؤقت تسجيل الخروج التلقائي
        render();
    }

    // Enhanced Confetti effect
    function createConfetti() {
        const colors = ['#d4af37', '#2ecc71', '#3498db', '#e74c3c', '#f39c12', '#9b59b6'];
        const shapes = ['circle', 'square', 'triangle'];
        const confettiCount = 60;
        
        for (let i = 0; i < confettiCount; i++) {
            const confetti = document.createElement('div');
            const shape = shapes[Math.floor(Math.random() * shapes.length)];
            const size = Math.random() * 8 + 8; // 8-16px
            const color = colors[Math.floor(Math.random() * colors.length)];
            
            confetti.style.position = 'fixed';
            confetti.style.width = size + 'px';
            confetti.style.height = size + 'px';
            confetti.style.backgroundColor = color;
            confetti.style.left = Math.random() * 100 + '%';
            confetti.style.top = '-20px';
            confetti.style.opacity = '1';
            confetti.style.zIndex = '99999';
            confetti.style.pointerEvents = 'none';
            confetti.style.boxShadow = `0 0 ${size}px ${color}`;
            
            // Shape styling
            if (shape === 'circle') {
                confetti.style.borderRadius = '50%';
            } else if (shape === 'triangle') {
                confetti.style.width = '0';
                confetti.style.height = '0';
                confetti.style.backgroundColor = 'transparent';
                confetti.style.borderLeft = size/2 + 'px solid transparent';
                confetti.style.borderRight = size/2 + 'px solid transparent';
                confetti.style.borderBottom = size + 'px solid ' + color;
            } else {
                confetti.style.borderRadius = '2px';
            }
            
            document.body.appendChild(confetti);
            
            // Animate with different speeds and paths
            const duration = 2000 + Math.random() * 1000; // 2-3 seconds
            const xMovement = (Math.random() - 0.5) * 300;
            const rotation = Math.random() * 1080; // 0-1080 degrees
            const delay = Math.random() * 100;
            
            setTimeout(() => {
                confetti.style.transition = `all ${duration}ms cubic-bezier(0.25, 0.46, 0.45, 0.94)`;
                confetti.style.top = '100vh';
                confetti.style.opacity = '0';
                confetti.style.transform = `translateX(${xMovement}px) rotate(${rotation}deg) scale(0.5)`;
            }, delay);
            
            setTimeout(() => {
                confetti.remove();
            }, duration + delay + 100);
        }
    }

    async function executeTrade(type, quantity) {
        const stock = appState.selectedStock;
        const cost = stock.price * quantity;
        
        // Get fresh reference to user in appData
        const user = appData.users.find(u => u.username === appState.currentUser.username);
        
        // Validate user exists
        if (!user) {
            showAlert('خطأ: المستخدم غير موجود', 'error');
            return;
        }

        // Find or create portfolio
        let portfolio = appData.portfolios.find(p => p.username === user.username);
        if (!portfolio) {
            portfolio = {
                username: user.username,
                holdings: []
            };
            appData.portfolios.push(portfolio);
        }

        if (type === 'buy') {
            // Block students and guests from buying with insufficient or negative balance
            if (appState.currentUser.role !== 'admin' && user.balance < cost) {
                showAlert('رصيدك غير كافٍ لإتمام عملية الشراء ❌', 'error');
                return;
            }
            
            // Update balance
            user.balance -= cost;
            
            const holding = portfolio.holdings.find(h => h.symbol === stock.symbol);
            
            if (holding) {
                const totalCost = (holding.avgPrice * holding.quantity) + cost;
                holding.quantity += quantity;
                holding.avgPrice = totalCost / holding.quantity;
            } else {
                portfolio.holdings.push({
                    symbol: stock.symbol,
                    quantity: quantity,
                    avgPrice: stock.price
                });
            }

            const tx = {
                id: Date.now(),
                username: user.username,
                symbol: stock.symbol,
                name: stock.name,
                type: 'buy',
                quantity,
                price: stock.price,
                total: cost,
                timestamp: new Date().toISOString()
            };
            appData.transactions.unshift(tx);
            addActivityLog('شراء سهم', `${user.username} اشترى ${quantity} من ${stock.name} بسعر ${stock.price.toFixed(2)} ر.س`);
            
            // Notification only for admin
            if (appState.currentUser.role === 'admin') {
                addNotification(`✅ تم شراء ${quantity} من ${stock.name}`, 'success');
            }
            
            showAlert(`تم شراء ${quantity} من ${stock.name} بنجاح ✅`, 'success');
        } else {
            const holding = portfolio.holdings.find(h => h.symbol === stock.symbol);
            if (!holding || holding.quantity < quantity) {
                showAlert('لا تملك الكمية الكافية للبيع ❌', 'error');
                return;
            }

            // Update balance
            user.balance += cost;
            
            const profit = (stock.price - holding.avgPrice) * quantity;
            holding.quantity -= quantity;
            
            if (holding.quantity === 0) {
                portfolio.holdings = portfolio.holdings.filter(h => h.symbol !== stock.symbol);
            }

            const tx = {
                id: Date.now(),
                username: user.username,
                symbol: stock.symbol,
                name: stock.name,
                type: 'sell',
                quantity,
                price: stock.price,
                total: cost,
                profit,
                timestamp: new Date().toISOString()
            };
            appData.transactions.unshift(tx);
            addActivityLog('بيع سهم', `${user.username} باع ${quantity} من ${stock.name} بسعر ${stock.price.toFixed(2)} ر.س (ربح: ${profit.toFixed(2)} ر.س)`);
            // Notification removed for cleaner UX
            
            // إضافة تأثير احتفالي عند الربح
            if (profit > 0) {
                createConfetti();
            }
            
            showAlert(`تم بيع ${quantity} من ${stock.name} بنجاح ✅`, 'success');
        }

        checkAchievements(user.username);
        
        // Update currentUser reference to the fresh user data
        appState.currentUser = user;
        
        // ⚡ حفظ فوري بدون debounce لمنع فقدان البيانات
        await saveTradeImmediately();
        appState.selectedStock = null;
        render();
    }

        if (balanceModalState.show) modalHTML = renderBalanceModal();

        if (addStockModal.show) modalHTML = renderAddStockModal();
        if (editUsernameModal.show) modalHTML = renderEditUsernameModal();
        if (confirmModal.show) modalHTML = renderConfirmModal();
        if (modifyAddedBalanceModal.show) modalHTML = renderModifyAddedBalanceModal();
        modals.innerHTML = modalHTML;

        // استعادة التركيز (Focus) - حل مشكلة الجوال
        if (activeId) {
            const element = document.getElementById(activeId) || document.querySelector(`[name="${activeId}"]`);
            if (element) element.focus();
        }
        
        // استعادة موقع السكرول في الدردشة
        if (scrollPos !== null) {
            const chatContainer = document.querySelector('.chat-container');
            if (chatContainer) chatContainer.scrollTop = scrollPos;
        }

        attachEventListeners();
    }

async function handleVerify(e) {
e.preventDefault();
const enteredCode = e.target.verifyCode.value.trim();

// التحقق من وجود confirmationResult
if (!window.confirmationResult || !window.pendingRegistration) {
    showAlert('حدث خطأ. يرجى المحاولة مرة أخرى ❌', 'error');
    appState.currentScreen = 'register';
    render();
    return;
}

try {
    showAlert('جاري التحقق من الرمز...', 'info');

    // التحقق من الرمز عبر Firebase
    const result = await window.confirmationResult.confirm(enteredCode);
    
    console.log('✅ Phone verified successfully');

    // Additional security check: Verify the phone number matches
    if (false && result.phoneNumber && result.phoneNumber !== window.pendingRegistration.phone) { // soft check disabled
        console.error('❌ Phone number mismatch:', result.phoneNumber, 'vs', window.pendingRegistration.phone);
        showAlert('خطأ في التحقق من رقم الجوال ❌', 'error');
        appState.currentScreen = 'register';
        render();
        return;
    }

    // تسجيل الطالب في النظام
    const newStudent = { ...window.pendingRegistration };
    
    // تشفير كلمة المرور
    const passwordToHash = newStudent.password;
    delete newStudent.password;
    newStudent.passwordHash = await hashPassword(passwordToHash);
    
    // Mark phone as verified with timestamp
    newStudent.phoneVerified = true;
    newStudent.phoneVerifiedAt = new Date().toISOString();
    
    // إضافة الطالب إلى المستخدمين
    appData.users.push(newStudent);
    
    // إنشاء محفظة للطالب
    appData.portfolios.push({
        username: newStudent.username,
        holdings: []
    });
    
    // حفظ البيانات
    saveData();
    
    // تسجيل النشاط
    addActivityLog('تسجيل جديد', `انضم الطالب ${newStudent.username} إلى السوق`);
    
    // تنظيف البيانات المؤقتة
    window.confirmationResult = null;
    window.pendingRegistration = null;
    pendingRegistration = null;
    
    // تسجيل خروج من Firebase Auth
    try { await firebase.auth().signOut(); } catch(e) { /* ignore */ }
    
    // عرض رسالة النجاح
    showAlert(`✅ تم إنشاء الحساب بنجاح!\n\nمرحباً ${newStudent.username}\n\nيمكنك الآن تسجيل الدخول`, 'success');
    
    // الانتقال إلى شاشة تسجيل الدخول
    appState.currentScreen = 'login';
    render();

} catch (error) {
    console.error('❌ Verification error:', error);
    
    let errorMsg = 'رمز التحقق غير صحيح';
    
    if (error.code === 'auth/invalid-verification-code') {
        errorMsg = 'رمز التحقق غير صحيح';
    } else if (error.code === 'auth/code-expired') {
        errorMsg = 'انتهت صلاحية الرمز. حاول التسجيل مرة أخرى';
    }
    
    showAlert(errorMsg + ' ❌', 'error');
}

}

// Guest Registration Handlers
async function handleGuestRegister(e) {
e.preventDefault();

// Get form data
const displayName = e.target.guestDisplayName.value.trim();
const username = e.target.guestUsername.value.trim();
const phone = e.target.guestPhone.value.trim();
const password = e.target.guestPassword.value;
const confirmPassword = e.target.guestConfirmPassword.value;

// Validate password match
if (password !== confirmPassword) {
    showAlert('كلمة المرور غير متطابقة ❌', 'error');
    return;
}

// Check for duplicate username
if (appData.users.find(u => u.username === username)) {
    showAlert('اسم المستخدم موجود مسبقاً ❌', 'error');
    return;
}

// Format phone number
const formattedPhone = formatPhoneNumber(phone);

if (!formattedPhone) {
    showAlert('رقم الجوال غير صحيح ❌', 'error');
    return;
}

// Check for duplicate phone across ALL users (students and guests)
const existingUserWithPhone = appData.users.find(u => u.phone === phone || u.phone === formattedPhone);
if (existingUserWithPhone) {
    const userType = existingUserWithPhone.role === 'guest' ? 'ضيف' : 'طالب';
    showAlert(`رقم الجوال مسجل مسبقاً كـ ${userType} ❌\nلا يمكن استخدام نفس الرقم لحسابين`, 'error');
    return;
}

try {
    showAlert('جاري إرسال رمز التحقق...', 'info');

    // إرسال SMS مباشرة بدون reCAPTCHA
    console.log('📤 Sending SMS to guest:', formattedPhone);
    const confirmationResult = await sendSmsCode(formattedPhone);

    console.log('✅ SMS sent to guest:', formattedPhone);

    // Save confirmation result
    window.guestConfirmationResult = confirmationResult;
    
    // Save pending guest registration
    window.pendingGuestRegistration = {
        username,
        displayName,
        phone: formattedPhone,
        password, // Will be hashed after verification
        role: 'guest',
        balance: INITIAL_GUEST_BALANCE, // Initial balance for guests
        color: '#' + Math.floor(Math.random()*16777215).toString(16),
        achievements: [],
        suspended: false,
        notifications: [],
        phoneVerified: false, // Will be set to true after SMS verification
        phoneVerifiedAt: undefined // Will be set after SMS verification
    };

    // Go to verification screen
    appState.currentScreen = 'guestVerify';
    render();
    showAlert(`تم إرسال رمز التحقق إلى ${formattedPhone}. قد يستغرق الأمر بضع دقائق. تحقق من صندوق الرسائل.`, 'success');

} catch (error) {
    console.error('❌ Guest registration SMS error:', error);
    console.error('Error details:', {
        code: error.code,
        message: error.message,
        phone: formattedPhone
    });
    
    const errorMessage = getAuthErrorMessage(error);
    showAlert(errorMessage + ' ❌', 'error');
    
}

}

async function handleGuestVerify(e) {
e.preventDefault();
const enteredCode = e.target.guestVerifyCode.value.trim();

// Check if confirmation result exists
if (!window.guestConfirmationResult || !window.pendingGuestRegistration) {
    showAlert('حدث خطأ. يرجى المحاولة مرة أخرى ❌', 'error');
    appState.currentScreen = 'guestRegister';
    render();
    return;
}

try {
    showAlert('جاري التحقق من الرمز...', 'info');

    // Verify code via Firebase
    const result = await window.guestConfirmationResult.confirm(enteredCode);
    
    console.log('✅ Guest phone verified:', result.phoneNumber);

    // Additional security check: Verify the phone number matches (normalize by stripping spaces)
    const normalizePhone = p => (p || '').replace(/\s+/g, '');
    if (result.phoneNumber && normalizePhone(result.phoneNumber) !== normalizePhone(window.pendingGuestRegistration.phone)) {
        console.error('❌ Phone number mismatch:', result.phoneNumber, 'vs', window.pendingGuestRegistration.phone);
        showAlert('خطأ في التحقق من رقم الجوال ❌', 'error');
        appState.currentScreen = 'guestRegister';
        render();
        return;
    }

    // Register guest in system
    const newGuest = { ...window.pendingGuestRegistration };
    
    // Hash password
    const passwordToHash = newGuest.password;
    delete newGuest.password;
    newGuest.passwordHash = await hashPassword(passwordToHash);
    
    // Mark phone as verified with timestamp
    newGuest.phoneVerified = true;
    newGuest.phoneVerifiedAt = new Date().toISOString();
    
    // Add guest to users
    appData.users.push(newGuest);
    
    // Create portfolio for guest
    appData.portfolios.push({
        username: newGuest.username,
        holdings: []
    });
    
    // Save data
    saveData();
    
    // Log activity
    addActivityLog('تسجيل ضيف جديد', `انضم الضيف ${newGuest.username} (${newGuest.displayName}) إلى السوق`);
    
    // Clean up temporary data
    window.guestConfirmationResult = null;
    window.pendingGuestRegistration = null;
    
    // Sign out from Firebase Auth
    await firebase.auth().signOut();
    
    // Show success message
    showAlert(`✅ تم إنشاء حساب الضيف بنجاح!\n\nمرحباً ${newGuest.displayName}\n\nيمكنك الآن تسجيل الدخول`, 'success');
    
    // Go to login screen
    appState.currentScreen = 'login';
    render();

} catch (error) {
    console.error('❌ Guest verification error:', error);
    
    let errorMsg = 'رمز التحقق غير صحيح';
    
    if (error.code === 'auth/invalid-verification-code') {
        errorMsg = 'رمز التحقق غير صحيح';
    } else if (error.code === 'auth/code-expired') {
        errorMsg = 'انتهت صلاحية الرمز. حاول التسجيل مرة أخرى';
    }
    
    showAlert(errorMsg + ' ❌', 'error');
}

}

    function deleteNotification(notificationId, event) {
        if (event) event.stopPropagation();
        
        // Convert to number for comparison since IDs are numeric
        const numId = Number(notificationId);
        
        // Delete from current user's notifications by finding the matching ID
        if (appState.currentUser.notifications) {
            const index = appState.currentUser.notifications.findIndex(n => n.id === numId);
            if (index !== -1) {
                appState.currentUser.notifications.splice(index, 1);
            }
        }
        
        // Update in appData.users array
        const user = appData.users.find(u => u.username === appState.currentUser.username);
        if (user && user.notifications) {
            const index = user.notifications.findIndex(n => n.id === numId);
            if (index !== -1) {
                user.notifications.splice(index, 1);
            }
        }
        
        saveData();
        // Update only the notification dropdown instead of full render
        const dropdown = document.querySelector('.notification-dropdown');
        if (dropdown) {
            dropdown.outerHTML = renderNotificationDropdown();
        }
    }

    function clearAllNotifications(event) {
        if (event) event.stopPropagation();
        
        // Clear current user's notifications
        if (appState.currentUser) {
            appState.currentUser.notifications = [];
        }
        
        // Update in appData.users array
        const user = appData.users.find(u => u.username === appState.currentUser.username);
        if (user) {
            user.notifications = [];
        }
        
        saveData();
        // Update only the notification dropdown instead of full render
        const dropdown = document.querySelector('.notification-dropdown');
        if (dropdown) {
            dropdown.outerHTML = renderNotificationDropdown();
        }
    }

    // Delete individual transaction
    async function deleteTransaction(transactionId, event) {
        if (event) event.stopPropagation();
        
        // Find the transaction
        const txIndex = appData.transactions.findIndex(t => t.id === transactionId && t.username === appState.currentUser.username);
        if (txIndex === -1) {
            alert('لا يمكن حذف هذا السجل');
            return;
        }
        
        // Remove from local array
        appData.transactions.splice(txIndex, 1);
        
        // Remove from Firebase
        try {
            await db.collection('transactions').doc(String(transactionId)).delete();
            saveData();
            render();
        } catch (error) {
            console.error('Error deleting transaction:', error);
            alert('حدث خطأ في حذف السجل');
        }
    }

    // Delete all transactions for current user
    async function clearAllTransactions(event) {
        if (event) event.stopPropagation();
        
        const username = appState.currentUser.username;
        const userTransactions = appData.transactions.filter(t => t.username === username);
        
        // Remove from local array
        appData.transactions = appData.transactions.filter(t => t.username !== username);
        
        // Remove from Firebase
        try {
            const batch = db.batch();
            userTransactions.forEach(tx => {
                const docRef = db.collection('transactions').doc(String(tx.id));
                batch.delete(docRef);
            });
            await batch.commit();
            saveData();
            render();
        } catch (error) {
            console.error('Error deleting transactions:', error);
            alert('حدث خطأ في مسح السجل');
        }
    }

    // Admin: Sell all shares of a specific stock on behalf of a student or guest
    async function adminSellStock(username, symbol) {
        const stock = appData.stocks.find(s => s.symbol === symbol);
        if (!stock) {
            showAlert('السهم غير موجود ❌', 'error');
            return;
        }
        const user = appData.users.find(u => u.username === username);
        if (!user) {
            showAlert('المستخدم غير موجود ❌', 'error');
            return;
        }
        const portfolio = appData.portfolios.find(p => p.username === username);
        const holding = portfolio ? portfolio.holdings.find(h => h.symbol === symbol) : null;
        if (!holding || holding.quantity <= 0) {
            showAlert('لا يوجد أسهم للبيع ❌', 'error');
            return;
        }
        if (!window.confirm(`هل تريد بيع ${holding.quantity} سهم من "${stock.name}" لـ "${username}"؟`)) {
            return;
        }
        const quantity = holding.quantity;
        const total = stock.price * quantity;
        const profit = (stock.price - holding.avgPrice) * quantity;
        const oldBalance = user.balance;
        const oldHoldings = portfolio.holdings.slice();
        user.balance += total;
        portfolio.holdings = portfolio.holdings.filter(h => h.symbol !== symbol);
        const tx = {
            id: Date.now(),
            username,
            symbol: stock.symbol,
            name: stock.name,
            type: 'sell',
            quantity,
            price: stock.price,
            total,
            profit,
            timestamp: new Date().toISOString()
        };
        appData.transactions.unshift(tx);
        addActivityLog('بيع سهم (مشرف)', `المشرف باع ${quantity} من ${stock.name} لـ ${username} بسعر ${stock.price.toFixed(2)} ر.س (ربح: ${profit.toFixed(2)} ر.س)`);
        try {
            await db.collection('users').doc(username).update({ balance: user.balance });
            await saveData();
            showAlert(`✅ تم بيع ${quantity} سهم من ${stock.name} لـ ${username}`, 'success');
        } catch (error) {
            console.error('Error in admin sell:', error);
            user.balance = oldBalance;
            portfolio.holdings = oldHoldings;
            appData.transactions = appData.transactions.filter(t => t !== tx);
            showAlert('❌ حدث خطأ أثناء البيع', 'error');
        }
        render();
    }

        return `
            <div class="tab-content active">
                <div class="card">
                    <h3>أسهمي 📈</h3>
                    ${portfolio && portfolio.holdings.length > 0 ? `
                        <table style="width:100%;">
                            <thead>
                                <tr>
                                    <th>السهم</th>
                                    <th>الكمية</th>
                                    <th>متوسط الشراء</th>
                                    <th>السعر الحالي</th>
                                    <th>القيمة الإجمالية</th>
                                    <th>الربح/الخسارة</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${portfolio.holdings.map(h => {
                                    const stock = appData.stocks.find(s => s.symbol === h.symbol);
                                    const totalValue = stock ? (stock.price * h.quantity) : 0;
                                    const profit = stock ? (stock.price - h.avgPrice) * h.quantity : 0;
                                    const profitPercent = stock && h.avgPrice > 0 ? ((stock.price - h.avgPrice) / h.avgPrice) * 100 : 0;
                                    const profitColor = profit >= 0 ? 'var(--success)' : 'var(--danger)';
                                    return `
                                        <tr>
                                            <td><strong>${h.symbol}</strong>${stock ? `<br><small style="color: var(--text-secondary);">${stock.name}</small>` : ''}</td>
                                            <td>${h.quantity}</td>
                                            <td>${h.avgPrice.toFixed(2)} ر.س</td>
                                            <td>${stock ? stock.price.toFixed(2) : '-'} ر.س</td>
                                            <td>${totalValue.toFixed(2)} ر.س</td>
                                            <td style="color: ${profitColor}; font-weight: bold;">
                                                ${profit >= 0 ? '+' : ''}${profit.toFixed(2)} ر.س
                                                <br><small>(${profit >= 0 ? '+' : ''}${profitPercent.toFixed(2)}%)</small>
                                            </td>
                                        </tr>
                                    `;
                                }).join('')}
                            </tbody>
                        </table>
                    ` : '<p style="text-align:center;padding:2rem;color:var(--text-secondary);">لا توجد أسهم في محفظتك</p>'}
                </div>
            </div>
        `;
    }

    function renderLeaderboardTab(isAdmin) {
        const students = appData.users.filter(u => u.role === 'student');
        const leaderboard = students.map(student => {
            const portfolio = appData.portfolios.find(p => p.username === student.username);
            const stockCount = portfolio ? portfolio.holdings.reduce((sum, h) => sum + h.quantity, 0) : 0;
            
            return {
                username: student.username,
                balance: student.balance,
                stockCount: stockCount,
                total: student.balance + getPortfolioValue(student.username),
                color: student.color
            };
        }).sort((a, b) => b.total - a.total);

        return `
            <div class="tab-content active">
                <div class="card">
                    <h2 style="margin-bottom: 1.5rem;">لوحة المتصدرين 🏅</h2>

                            if (index === 0) rankClass = 'rank-1 gold';

                                    <div class="color-dot" style="background: ${item.color};"></div>
                                    <div class="leaderboard-info">

    function executeAddStock() {
        const symbol = document.getElementById('stockSymbolInput').value.trim();
        const name = document.getElementById('stockNameInput').value.trim();
        const price = parseFloat(document.getElementById('stockPriceStartInput').value);

        if (!symbol) {
            showAlert('أدخل رمز السهم!', 'error');
            return;
        }

        if (appData.stocks.find(s => s.symbol === symbol)) {
            showAlert('الرمز موجود مسبقاً!', 'error');
            return;
        }

        if (!name) {
            showAlert('أدخل اسم السهم!', 'error');
            return;
        }

        if (!price || price <= 0) {
            showAlert('أدخل سعر صحيح!', 'error');
            return;
        }

        appData.stocks.push({
            symbol,
            name,
            price,
            change: 0,
            history: generateHistory(price)
        });

        addActivityLog('إضافة سهم', `إضافة سهم ${name} (${symbol})`);
        showAlert(`✅ تم إضافة سهم ${name}`, 'success');
        saveData();
        closeAddStockModal();
    }

    function increaseStockPrice() {
        const input = document.getElementById('stockPriceInput');
        const amount = parseFloat(input.value);
        if (!amount || amount <= 0) {
            showAlert('أدخل مبلغ صحيح!', 'error');
            return;
        }
        
        const stock = appData.stocks[stockPriceModal.stockIndex];
        const oldPrice = stock.price;
        stock.price += amount;
        stock.change = ((stock.price - oldPrice) / oldPrice) * 100;
        stock.history.push(stock.price);
        if (stock.history.length > 30) stock.history.shift();
        
        addActivityLog('زيادة سعر سهم', `زيادة سعر ${stock.name} بمقدار ${amount.toFixed(2)} من ${oldPrice.toFixed(2)} إلى ${stock.price.toFixed(2)}`);
        showAlert(`✅ تم زيادة سعر ${stock.name} بمقدار ${amount.toFixed(2)} ر.س`, 'success');
        
        if (Math.abs(stock.change) >= 5) {
            addNotification(`⚠️ تغير كبير في ${stock.name}: +${stock.change.toFixed(2)}%`, 'warning');
        }
        
        saveData();
        closeStockPriceModal();
    }

    function decreaseStockPrice() {
        const input = document.getElementById('stockPriceInput');
        const amount = parseFloat(input.value);
        if (!amount || amount <= 0) {
            showAlert('أدخل مبلغ صحيح!', 'error');
            return;
        }
        
        const stock = appData.stocks[stockPriceModal.stockIndex];
        const oldPrice = stock.price;
        
        if (stock.price - amount <= 0) {
            showAlert('السعر لا يمكن أن يكون صفر أو سالب!', 'error');
            return;
        }
        
        stock.price -= amount;
        stock.change = ((stock.price - oldPrice) / oldPrice) * 100;
        stock.history.push(stock.price);
        if (stock.history.length > 30) stock.history.shift();
        
        addActivityLog('تخفيض سعر سهم', `تخفيض سعر ${stock.name} بمقدار ${amount.toFixed(2)} من ${oldPrice.toFixed(2)} إلى ${stock.price.toFixed(2)}`);
        showAlert(`✅ تم تخفيض سعر ${stock.name} بمقدار ${amount.toFixed(2)} ر.س`, 'success');
        
        if (Math.abs(stock.change) >= 5) {
            addNotification(`⚠️ تغير كبير في ${stock.name}: ${stock.change.toFixed(2)}%`, 'warning');
        }
        
        saveData();
        closeStockPriceModal();
    }

    async function deleteStock(idx) {
        const stock = appData.stocks[idx];
        
        if (window.confirm(`هل تريد حذف سهم ${stock.name} (${stock.symbol})؟\n\n⚠️ سيتم حذفه من جميع المحافظ!`)) {

            addActivityLog('حذف سهم', `حذف سهم ${stock.name} (${stock.symbol})`);

            render();
        }

    async function resetWeeklyStats() {
        if (window.confirm('هل تريد إعادة تعيين التقرير الأسبوعي؟\n\n⚠️ سيتم حذف سجل المعاملات فقط.\n✅ ستبقى الأرصدة والأسهم كما هي.')) {
            appData.weeklyStats.lastReset = new Date().toISOString();
            
            // Delete all transactions permanently (but keep balances and portfolios)
            appData.transactions = [];
            
            // Delete from Firebase in batches (Firestore allows max 500 ops per batch)
            const BATCH_LIMIT = 499;
            const txSnapshot = await db.collection('transactions').get();
            const docs = txSnapshot.docs;
            for (let i = 0; i < docs.length; i += BATCH_LIMIT) {
                const deleteBatch = db.batch();
                docs.slice(i, i + BATCH_LIMIT).forEach(doc => deleteBatch.delete(doc.ref));
                await deleteBatch.commit();
            }
            
            addActivityLog('إعادة تعيين التقرير', 'تم إعادة تعيين التقرير الأسبوعي وحذف سجل المعاملات (تم الاحتفاظ بالأرصدة والأسهم)');
            showAlert('✅ تم إعادة تعيين التقرير الأسبوعي وحذف سجل المعاملات (تم الاحتفاظ بالأرصدة والأسهم)', 'success');
            await saveData();
            render();
        }
    }

    function executeTradeFromModal(type) {
        const input = document.getElementById('tradeQuantityInput');
        const quantity = parseInt(input.value);
        
        if (!quantity || quantity < 1) {
            showAlert('أدخل كمية صحيحة!', 'error');
            return;
        }
        
        // إضافة مؤشر تحميل
        const buttons = document.querySelectorAll('button[onclick*="executeTradeFromModal"]');
        buttons.forEach(btn => {
            btn.style.opacity = '0.7';
            btn.style.pointerEvents = 'none';
            const originalText = btn.innerHTML;
            btn.innerHTML = '<div style="font-size: 1.5rem;">⏳</div><div>جاري التنفيذ...</div>';
            
            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.style.opacity = '1';
                btn.style.pointerEvents = 'auto';
            }, 500);
        });
        
        executeTrade(type, quantity);
    }

    function attachEventListeners() {
        // Draw chart if modal is open
        if (appState.selectedStock) {
            setTimeout(drawStockChart, 100);
        }
    }

    function drawStockChart() {
        const canvas = document.getElementById('stockChart');
        if (!canvas) return;
        
        const ctx = canvas.getContext('2d');
        const stock = appState.selectedStock;
        
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: stock.history.map((_, i) => `${30-i}د`),
                datasets: [{
                    label: 'السعر',
                    data: stock.history,
                    borderColor: '#d4af37',
                    backgroundColor: 'rgba(212, 175, 55, 0.1)',
                    tension: 0.4,
                    fill: true,
                    pointRadius: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false }
                },
                scales: {
                    y: {
                        grid: { color: 'rgba(255, 255, 255, 0.05)' },
                        ticks: { color: '#a8c5b8' }
                    },
                    x: {
                        grid: { display: false },
                        ticks: { color: '#a8c5b8', maxTicksLimit: 6 }
                    }
                }
            }
        });
    }
